<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Tixl · Tickets Essential - Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Light/Dark Mode Variables - matching main system */
        :root {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-mid: #16213e;
            --bg-gradient-end: #0f0f1a;
            --bg-card: rgba(26,26,46,0.9);
            --bg-card-solid: #1a1a2e;
            --text-primary: #F0F0F5;
            --text-secondary: #A0A0B5;
            --border-color: #2A2A3A;
            --accent-purple: #9B59B6;
            --accent-purple-light: #BE7BDE;
            --accent-purple-dark: #7D3C98;
            --accent-lavender: #D4B8D9;
            --input-bg: rgba(0,0,0,0.4);
            --shadow-color: rgba(0,0,0,0.3);
            --weak-red: #e06c6c;
            --medium-yellow: #e0c46c;
            --strong-green: #6cae6c;
            --transition-default: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body.light-mode {
            --bg-gradient-start: #f5f0e8;
            --bg-gradient-mid: #faf5ed;
            --bg-gradient-end: #f0ebe3;
            --bg-card: rgba(255,255,255,0.95);
            --bg-card-solid: #ffffff;
            --text-primary: #2C2A28;
            --text-secondary: #6B6762;
            --border-color: #E8E4DD;
            --accent-purple: #8B5E3C;
            --accent-purple-light: #B88A5A;
            --accent-purple-dark: #6B4528;
            --accent-lavender: #D4B896;
            --input-bg: rgba(0,0,0,0.03);
            --shadow-color: rgba(0,0,0,0.08);
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 50%, var(--bg-gradient-end) 100%);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(1rem, 5vw, 2.5rem);
            transition: background 0.3s ease, color 0.3s ease;
            position: relative;
        }

        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: var(--accent-purple);
            border-radius: 50%;
            opacity: 0.4;
            pointer-events: none;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .container {
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 10;
            animation: fadeInUp 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand {
            text-align: center;
            margin-bottom: clamp(1.5rem, 5vw, 2rem);
        }

        .brand h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 10vw, 3.2rem);
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-lavender));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .brand p {
            color: var(--text-secondary);
            font-size: clamp(0.7rem, 3vw, 0.85rem);
            margin-top: 0.6rem;
            letter-spacing: 0.5px;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(14px);
            border-radius: clamp(1.5rem, 6vw, 2rem);
            padding: clamp(1.5rem, 5vw, 2.2rem) clamp(1rem, 5vw, 2rem) clamp(1.8rem, 6vw, 2.2rem);
            box-shadow: 0 20px 40px var(--shadow-color);
            border: 1px solid var(--border-color);
            transition: var(--transition-default);
        }

        .step {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .step.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(8px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .step-header {
            text-align: center;
            margin-bottom: 1.8rem;
        }

        .step-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 6vw, 1.9rem);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .step-header p {
            font-size: clamp(0.7rem, 3.5vw, 0.8rem);
            color: var(--text-secondary);
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--accent-purple);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            flex: 1;
            padding-right: 3rem;
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 1rem;
            user-select: none;
            transition: 0.2s;
        }

        .toggle-password:hover {
            color: var(--accent-purple);
        }

        .input-group input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: all 0.2s;
            color: var(--text-primary);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 3px rgba(155, 89, 182, 0.2);
        }

        .input-group input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        /* Password strength indicator */
        .strength-container {
            margin-top: 0.5rem;
        }
        .strength-bar {
            height: 4px;
            border-radius: 4px;
            background: var(--border-color);
            overflow: hidden;
        }
        .strength-fill {
            height: 100%;
            width: 0%;
            transition: width 0.2s, background 0.2s;
            border-radius: 4px;
        }
        .strength-fill.weak { background: var(--weak-red); width: 33%; }
        .strength-fill.medium { background: var(--medium-yellow); width: 66%; }
        .strength-fill.strong { background: var(--strong-green); width: 100%; }
        .strength-text {
            font-size: 0.7rem;
            margin-top: 0.35rem;
            color: var(--text-secondary);
        }
        .strength-text.weak { color: var(--weak-red); }
        .strength-text.medium { color: var(--medium-yellow); }
        .strength-text.strong { color: var(--strong-green); }

        .btn-primary {
            width: 100%;
            padding: 0.9rem;
            background: var(--accent-purple);
            color: white;
            border: none;
            border-radius: 2.5rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 0.5rem;
        }

        .btn-primary:hover {
            transform: scale(0.98);
            filter: brightness(1.05);
        }

        .btn-secondary {
            width: 100%;
            padding: 0.8rem;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 2.5rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.8rem;
        }

        .btn-secondary:hover {
            background: var(--input-bg);
            color: var(--text-primary);
            border-color: var(--accent-purple);
        }

        .message {
            text-align: center;
            font-size: 0.75rem;
            margin-top: 1.2rem;
            padding: 0.6rem;
            border-radius: 2rem;
            font-weight: 500;
        }

        .message.error {
            background: rgba(196, 65, 65, 0.2);
            color: #e06c6c;
            border: 1px solid #e06c6c;
        }

        .message.success {
            background: rgba(155, 89, 182, 0.2);
            color: var(--accent-purple-light);
            border: 1px solid var(--accent-purple);
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-decoration: none;
            transition: 0.2s;
            cursor: pointer;
            display: inline-block;
            padding: 0.3rem 0.5rem;
        }

        .back-link a:hover {
            color: var(--accent-purple);
            text-decoration: underline;
        }

        .theme-toggle-fixed {
            position: fixed;
            top: clamp(0.8rem, 4vw, 1.5rem);
            right: clamp(0.8rem, 4vw, 1.5rem);
            background: var(--bg-card-solid);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: clamp(0.7rem, 3vw, 0.8rem);
            font-weight: 500;
            color: var(--text-primary);
            transition: 0.2s;
            z-index: 100;
            font-family: 'Inter', sans-serif;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .theme-toggle-fixed:hover { 
            background: var(--accent-purple); 
            color: white; 
        }

        /* Small device optimizations */
        @media (max-width: 480px) {
            .card {
                padding: 1.2rem 1rem 1.6rem;
            }
            .input-group input {
                padding: 0.7rem 0.9rem;
                font-size: 0.85rem;
            }
            .btn-primary, .btn-secondary {
                padding: 0.75rem;
                font-size: 0.85rem;
            }
            .step-header h2 {
                font-size: 1.5rem;
            }
        }

        /* touch-friendly */
        button, .toggle-password, .theme-toggle-fixed, .back-link a {
            cursor: pointer;
            touch-action: manipulation;
        }
    </style>
</head>
<body>
    <button class="theme-toggle-fixed" id="themeToggle" aria-label="Switch light/dark mode">🌓 Light/Dark</button>
    <div id="particles"></div>
    <div class="container">
        <div class="brand">
            <h1>Tixl · Tickets Essential<span style="color: var(--accent-purple);">.</span></h1>
            <p>reset your password</p>
        </div>
        <div class="card">
            <!-- Step 1: Email Verification -->
            <div id="step1" class="step active">
                <div class="step-header">
                    <h2>forgot password?</h2>
                    <p>Enter your email address to verify your account</p>
                </div>
                <div class="input-group">
                    <label>email address</label>
                    <input type="email" id="resetEmail" placeholder="your@email.com" autocomplete="email" enterkeyhint="done">
                </div>
                <button class="btn-primary" onclick="verifyEmail()">verify email →</button>
                <div id="step1Message" class="message"></div>
                <div class="back-link">
                    <a href="index.html" aria-label="Back to login">← back to login</a>
                </div>
            </div>

            <!-- Step 2: Set New Password -->
            <div id="step2" class="step">
                <div class="step-header">
                    <h2>create new password</h2>
                    <p>Must be at least 6 characters</p>
                </div>
                <div class="input-group">
                    <label>new password</label>
                    <div class="password-wrapper">
                        <input type="password" id="newPassword" placeholder="••••••••" oninput="checkNewPasswordStrength()" autocomplete="new-password">
                        <span class="toggle-password" onclick="togglePasswordVisibility('newPassword', this)">👁️</span>
                    </div>
                    <div class="strength-container" id="newPasswordStrength">
                        <div class="strength-bar"><div class="strength-fill"></div></div>
                        <div class="strength-text"></div>
                    </div>
                </div>
                <div class="input-group">
                    <label>confirm new password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" placeholder="confirm your password" autocomplete="off">
                        <span class="toggle-password" onclick="togglePasswordVisibility('confirmPassword', this)">👁️</span>
                    </div>
                </div>
                <button class="btn-primary" onclick="resetPassword()">reset password →</button>
                <div id="step2Message" class="message"></div>
                <div class="back-link">
                    <a onclick="goBackToStep1()" style="cursor:pointer;">← back to email verification</a>
                    <span style="margin:0 8px">•</span>
                    <a href="index.html">login page</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ======================== Theme handling (matches index & ticket) ========================
        function initTheme() {
            const savedTheme = localStorage.getItem('tixl_theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
            } else {
                document.body.classList.remove('light-mode');
            }
        }
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('tixl_theme', isLight ? 'light' : 'dark');
        }
        document.getElementById('themeToggle')?.addEventListener('click', toggleTheme);
        initTheme();

        // Password visibility toggle (reusable)
        function togglePasswordVisibility(inputId, element) {
            const input = document.getElementById(inputId);
            if (!input) return;
            if (input.type === 'password') {
                input.type = 'text';
                element.textContent = '🙈';
            } else {
                input.type = 'password';
                element.textContent = '👁️';
            }
        }

        // ======================== STORAGE KEYS (MUST MATCH INDEX.HTML) ========================
        const STORAGE_USERS = 'tixl_users';
        const STORAGE_ADMINS = 'tixl_admins';
        let pendingResetEmail = null;
        let userType = null; // 'user' or 'admin'

        function loadUsers() { return JSON.parse(localStorage.getItem(STORAGE_USERS) || '[]'); }
        function saveUsers(users) { localStorage.setItem(STORAGE_USERS, JSON.stringify(users)); }
        function loadAdmins() { return JSON.parse(localStorage.getItem(STORAGE_ADMINS) || '[]'); }
        function saveAdmins(admins) { localStorage.setItem(STORAGE_ADMINS, JSON.stringify(admins)); }

        // ensure demo accounts exist to match index default behavior
        function ensureDefaultAccounts() {
            let users = loadUsers();
            if (users.length === 0) {
                const demoUser = {
                    id: 'user_demo1',
                    name: 'Alex Rivera',
                    grade: 'Grade 12 - Student',
                    section: 'STEM',
                    email: 'student@demo.com',
                    password: 'demo123',
                    bio: '',
                    role: 'user',
                    createdAt: new Date().toISOString()
                };
                saveUsers([demoUser]);
            }
            let admins = loadAdmins();
            if (admins.length === 0) {
                const demoAdmin = {
                    id: 'admin_demo1',
                    name: 'Admin Demo',
                    email: 'admin@demo.com',
                    password: 'admin123',
                    role: 'admin',
                    createdAt: new Date().toISOString()
                };
                saveAdmins([demoAdmin]);
            }
        }
        ensureDefaultAccounts();

        // Particles animation (subtle)
        function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            // Clear existing
            container.innerHTML = '';
            for (let i = 0; i < 35; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.left = Math.random() * 100 + '%';
                const size = Math.random() * 6 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
                particle.style.background = `hsl(${Math.random() * 60 + 260}, 70%, 60%)`;
                container.appendChild(particle);
            }
        }

        function showMessage(elementId, text, isError = true) {
            const el = document.getElementById(elementId);
            if (!el) return;
            el.textContent = text;
            el.className = isError ? 'message error' : 'message success';
            // Auto clear after 4 seconds, but not if it's a success redirection message
            setTimeout(() => {
                if (el.textContent === text) {
                    el.textContent = '';
                    el.className = 'message';
                }
            }, 4200);
        }

        function goToStep(stepNumber) {
            const step1 = document.getElementById('step1');
            const step2 = document.getElementById('step2');
            if (step1) step1.classList.remove('active');
            if (step2) step2.classList.remove('active');
            const targetStep = document.getElementById(`step${stepNumber}`);
            if (targetStep) targetStep.classList.add('active');
            
            // Clear messages when switching steps
            const msg1 = document.getElementById('step1Message');
            const msg2 = document.getElementById('step2Message');
            if (msg1) msg1.textContent = '';
            if (msg2) msg2.textContent = '';
        }

        function goBackToStep1() {
            pendingResetEmail = null;
            userType = null;
            const emailInput = document.getElementById('resetEmail');
            if (emailInput) emailInput.value = '';
            const newPwd = document.getElementById('newPassword');
            const confirmPwd = document.getElementById('confirmPassword');
            if (newPwd) newPwd.value = '';
            if (confirmPwd) confirmPwd.value = '';
            // reset strength indicator
            const fill = document.querySelector('#newPasswordStrength .strength-fill');
            const strengthText = document.querySelector('#newPasswordStrength .strength-text');
            if (fill) fill.style.width = '0%';
            if (strengthText) strengthText.textContent = '';
            goToStep(1);
        }

        function verifyEmail() {
            const emailInput = document.getElementById('resetEmail');
            const email = emailInput ? emailInput.value.trim() : '';
            
            if (!email) {
                showMessage('step1Message', '❌ Please enter your email address', true);
                return;
            }
            if (!email.includes('@') || !email.includes('.')) {
                showMessage('step1Message', '❌ Please enter a valid email address', true);
                return;
            }

            // Check both user and admin storage
            const users = loadUsers();
            const admins = loadAdmins();
            const existingUser = users.find(u => u.email === email);
            const existingAdmin = admins.find(a => a.email === email);

            if (!existingUser && !existingAdmin) {
                showMessage('step1Message', '❌ No account found with this email address', true);
                return;
            }

            // Store email and determine type
            pendingResetEmail = email;
            userType = existingAdmin ? 'admin' : 'user';
            
            showMessage('step1Message', '✓ Email verified! Please set your new password.', false);
            
            // Clear password fields and strength indicator before step2
            const newPwdField = document.getElementById('newPassword');
            const confirmPwdField = document.getElementById('confirmPassword');
            if (newPwdField) newPwdField.value = '';
            if (confirmPwdField) confirmPwdField.value = '';
            const fill = document.querySelector('#newPasswordStrength .strength-fill');
            const strengthTextSpan = document.querySelector('#newPasswordStrength .strength-text');
            if (fill) fill.style.width = '0%';
            if (strengthTextSpan) strengthTextSpan.textContent = '';
            
            goToStep(2);
        }

        function checkNewPasswordStrength() {
            const passwordInput = document.getElementById('newPassword');
            if (!passwordInput) return;
            const password = passwordInput.value;
            const container = document.getElementById('newPasswordStrength');
            if (!container) return;
            
            const fill = container.querySelector('.strength-fill');
            const textSpan = container.querySelector('.strength-text');
            if (!fill || !textSpan) return;
            
            if (!password) {
                fill.style.width = '0%';
                fill.className = 'strength-fill';
                textSpan.textContent = '';
                textSpan.className = 'strength-text';
                return;
            }
            
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            if (strength <= 2 || password.length < 6) {
                fill.className = 'strength-fill weak';
                textSpan.textContent = '🔴 Weak password';
                textSpan.className = 'strength-text weak';
            } else if (strength <= 4) {
                fill.className = 'strength-fill medium';
                textSpan.textContent = '🟡 Medium password';
                textSpan.className = 'strength-text medium';
            } else {
                fill.className = 'strength-fill strong';
                textSpan.textContent = '🟢 Strong password';
                textSpan.className = 'strength-text strong';
            }
        }

        function resetPassword() {
            const newPassword = document.getElementById('newPassword')?.value || '';
            const confirmPassword = document.getElementById('confirmPassword')?.value || '';
            
            if (!newPassword || !confirmPassword) {
                showMessage('step2Message', '❌ Please fill in both password fields', true);
                return;
            }
            
            if (newPassword.length < 6) {
                showMessage('step2Message', '❌ Password must be at least 6 characters', true);
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showMessage('step2Message', '❌ Passwords do not match', true);
                return;
            }
            
            if (!pendingResetEmail) {
                showMessage('step2Message', '❌ Session expired. Please start over.', true);
                goToStep(1);
                return;
            }
            
            // Update password in respective storage
            let updateSuccess = false;
            if (userType === 'user') {
                const users = loadUsers();
                const userIndex = users.findIndex(u => u.email === pendingResetEmail);
                if (userIndex !== -1) {
                    users[userIndex].password = newPassword;
                    saveUsers(users);
                    updateSuccess = true;
                } else {
                    showMessage('step2Message', '❌ User account not found', true);
                    return;
                }
            } else if (userType === 'admin') {
                const admins = loadAdmins();
                const adminIndex = admins.findIndex(a => a.email === pendingResetEmail);
                if (adminIndex !== -1) {
                    admins[adminIndex].password = newPassword;
                    saveAdmins(admins);
                    updateSuccess = true;
                } else {
                    showMessage('step2Message', '❌ Admin account not found', true);
                    return;
                }
            } else {
                showMessage('step2Message', '❌ Invalid account type', true);
                return;
            }
            
            if (updateSuccess) {
                showMessage('step2Message', '✓ Password reset successful! Redirecting to login...', false);
                // Clear pending data
                pendingResetEmail = null;
                userType = null;
                // Redirect to login page after short delay
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1800);
            } else {
                showMessage('step2Message', '❌ Failed to update password. Please try again.', true);
            }
        }

        // optional: if user hits enter on email field
        document.getElementById('resetEmail')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verifyEmail();
        });
        document.getElementById('newPassword')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') resetPassword();
        });
        document.getElementById('confirmPassword')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') resetPassword();
        });

        createParticles();
